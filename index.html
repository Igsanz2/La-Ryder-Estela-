<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Ryder · CCVM vs RSHECC</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* CCVM: verde y azul oficiales + blanco */
  --ccvm-green:#1a5c2a;
  --ccvm-green2:#2a8040;
  --ccvm-blue:#1a3d6e;
  --ccvm-blue2:#2d6aad;
  --ccvm-light:#d4ebd8;
  /* RSHECC: verde oscuro + dorado/crema ecuestre */
  --rshe-green:#1e3a1e;
  --rshe-green2:#2d5a2d;
  --rshe-gold:#b8922a;
  --rshe-gold2:#d4aa45;
  --rshe-cream:#f5ead0;
  /* Neutrales */
  --bg:#101f12;
  --bg2:#152415;
  --bg3:#1a2a1a;
  --surface:rgba(28,48,30,0.85);
  --surface2:rgba(22,40,24,0.88);
  --white:#ffffff;
  --cream:#faf6ee;
  --gold:#d4b055;
  --gold2:#f0d485;
  --border:rgba(200,175,90,0.28);
  --border2:rgba(200,175,90,0.12);
  --text:rgba(252,248,240,0.95);
  --text2:rgba(252,248,240,0.65);
}

html{scroll-behavior:smooth}
body{
  font-family:'Barlow Condensed',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── GRAIN OVERLAY ── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:999;opacity:.35;
}
/* ── FIELD GRADIENT BG ── */
body::after{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 120% 60% at 50% -5%, rgba(26,92,42,0.28) 0%, transparent 55%),
    radial-gradient(ellipse 50% 70% at 0% 60%, rgba(26,61,110,0.18) 0%, transparent 50%),
    radial-gradient(ellipse 50% 70% at 100% 40%, rgba(30,58,30,0.22) 0%, transparent 50%),
    radial-gradient(ellipse 80% 40% at 50% 100%, rgba(184,146,42,0.10) 0%, transparent 60%);
  pointer-events:none;z-index:0;
}

/* ── DECORATIVE LINES ── */
.deco-lines{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.deco-lines::before{
  content:'';position:absolute;
  top:-20%;left:-10%;width:120%;height:140%;
  background:
    repeating-linear-gradient(
      -8deg,
      transparent,transparent 80px,
      rgba(201,168,76,0.018) 80px,rgba(201,168,76,0.018) 81px
    );
}

/* ── HERO ── */
.hero{position:relative;z-index:2;padding:0 0 0}

.hero-battle::before{
  content:'';position:absolute;inset:0;
  background:
    linear-gradient(to bottom, rgba(10,20,12,0.55) 0%, rgba(10,20,12,0.45) 60%, var(--bg) 100%),
    linear-gradient(to right, rgba(10,20,12,0.5) 0%, transparent 30%, transparent 70%, rgba(10,20,12,0.5) 100%);
  z-index:3;pointer-events:none;
}

/* CLUB SIDES */
.club-side{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:48px 32px 56px;
  position:relative;overflow:hidden;
}
.club-side.ccvm{
  background:linear-gradient(135deg, rgba(26,92,42,0.15) 0%, rgba(26,61,110,0.1) 100%);
  border-right:1px solid var(--border);
}
.club-side.rshe{
  background:linear-gradient(225deg, rgba(30,58,30,0.15) 0%, rgba(184,146,42,0.05) 100%);
  border-left:1px solid var(--border);
}
.club-side::before{
  content:'';position:absolute;inset:0;
  opacity:.06;
  background-image:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c9a84c' fill-opacity='1'%3E%3Cpath d='M20 20.5V18H0v5h5v5H0v5h20v-9.5zm-2 4.5h-1v-1h1v1zm-5 0h-1v-1h1v1zm-2 0h-1v-1h1v1zm-5 0h-1v-1h1v1zm12-4h-1v-1h1v1z'/%3E%3C/g%3E%3C/svg%3E");
}
.club-logo-wrap{
  width:100px;height:100px;
  border-radius:6px;
  border:none;
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  overflow:visible;
  margin-bottom:16px;
  filter:drop-shadow(0 4px 16px rgba(0,0,0,0.6));
  flex-shrink:0;
}
.club-logo-wrap img{width:100px;height:100px;object-fit:contain;}
.club-abbr{
  font-family:'Cinzel',serif;
  font-size:26px;font-weight:700;
  letter-spacing:3px;
  margin-bottom:6px;
}
.club-abbr.ccvm{color:var(--ccvm-light)}
.club-abbr.rshe{color:var(--rshe-cream)}
.club-fullname{
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--text2);text-align:center;max-width:180px;line-height:1.5;
  font-weight:500;
}
.club-founded{
  font-family:'Barlow Condensed',sans-serif;font-style:normal;
  font-size:11px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--gold);opacity:.75;margin-top:10px;
  border:1px solid rgba(201,168,76,0.25);
  padding:4px 12px;border-radius:2px;
  background:rgba(201,168,76,0.06);
}

/* HERO CENTER */
.hero-center{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px 28px;gap:12px;position:relative;z-index:2;
}
.hero-title{
  font-family:'Cinzel',serif;
  font-size:clamp(28px,4vw,52px);
  font-weight:900;
  color:var(--white);
  letter-spacing:4px;
  text-transform:uppercase;
  text-align:center;
  line-height:1;
  text-shadow:0 0 40px rgba(201,168,76,0.3);
}
.hero-title span{
  display:block;
  font-family:'Crimson Pro',serif;
  font-style:italic;font-weight:300;
  font-size:clamp(56px,9vw,110px);
  letter-spacing:0;
  color:#ffe87a;
  text-shadow:0 0 20px rgba(255,232,122,0.95), 0 0 60px rgba(255,210,80,0.7), 0 0 120px rgba(201,168,76,0.5);
}
.hero-years{
  font-size:10px;letter-spacing:4px;text-transform:uppercase;
  color:var(--text2);font-weight:500;
  display:flex;align-items:center;gap:10px;
}
.hero-years::before,.hero-years::after{content:'';display:block;width:20px;height:1px;background:var(--gold);opacity:.4;}
.hero-flag{font-size:18px}
.hero-venue{
  font-family:'Crimson Pro',serif;font-style:italic;
  font-size:22px;color:var(--gold2);opacity:1;text-align:center;letter-spacing:1px;
  text-shadow:0 0 30px rgba(232,201,122,0.5);
}

/* ── OVERVIEW STRIP ── */
.overview-wrap{position:relative;z-index:2;padding:0 20px;max-width:1000px;margin:0 auto 48px;}
.overview-label{
  font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);
  font-weight:600;opacity:.5;text-align:center;margin-bottom:12px;
}
.overview{
  display:grid;grid-template-columns:repeat(5,1fr);
  border:1px solid var(--border);
  background:var(--surface2);
  backdrop-filter:blur(12px);
  border-radius:4px;overflow:hidden;
}
.ov-item{
  padding:18px 8px;text-align:center;
  border-right:1px solid var(--border);
  cursor:pointer;transition:background .2s;
  position:relative;
}
.ov-item:last-child{border-right:none}
.ov-item:hover{background:rgba(201,168,76,0.06)}
.ov-item.tie-rshe::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(to right,var(--rshe-gold),var(--rshe-green2));
}
.ov-item.win-rshe-item::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--rshe-gold);
}
.ov-item.win-ccvm-item::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--ccvm-blue2);
}
.ov-year{
  font-family:'Cinzel',serif;font-size:18px;font-weight:700;
  color:var(--gold);display:block;margin-bottom:5px;
}
.ov-score{font-size:13px;font-weight:600;letter-spacing:1px;display:block;margin-bottom:7px;}
.ov-badge{
  font-size:8px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;
  padding:3px 8px;border-radius:2px;display:inline-block;
}
.ob-ccvm{background:rgba(26,92,42,0.4);color:var(--ccvm-light);border:1px solid rgba(42,128,64,0.4)}
.ob-rshe{background:rgba(184,146,42,0.2);color:var(--rshe-cream);border:1px solid rgba(184,146,42,0.4)}
.ob-tie{background:rgba(201,168,76,0.1);color:var(--gold);border:1px solid rgba(201,168,76,0.25)}
.ob-rshe-ret{background:rgba(30,58,30,0.4);color:var(--rshe-gold2);border:1px dashed rgba(184,146,42,0.4)}

/* ── NAV ── */
.tab-nav{
  position:relative;z-index:2;
  display:flex;justify-content:center;gap:3px;
  margin-bottom:36px;flex-wrap:wrap;padding:0 16px;
}
.tab-btn{
  background:transparent;
  border:1px solid var(--border);
  color:var(--text2);
  font-family:'Cinzel',serif;
  font-size:11px;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;
  padding:10px 20px;cursor:pointer;
  transition:all .2s;border-radius:2px;
}
.tab-btn:hover{border-color:var(--gold);color:var(--gold)}
.tab-btn.active{
  background:linear-gradient(135deg,rgba(201,168,76,0.25),rgba(201,168,76,0.1));
  border-color:var(--gold);color:var(--gold2);
  box-shadow:0 0 20px rgba(201,168,76,0.1);
}

/* ── CONTENT ── */
#content{position:relative;z-index:2;max-width:1100px;margin:0 auto;padding:0 20px 100px}
.tab-panel{display:none;animation:fadeUp .35s ease}
.tab-panel.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── SCOREBOARD ── */
.scoreboard{
  position:relative;overflow:hidden;
  border-radius:6px;margin-bottom:24px;
  border:1px solid var(--border);
  text-align:center;
}
.scoreboard-inner{
  background:linear-gradient(160deg,rgba(26,92,42,0.15) 0%,rgba(13,26,15,0.95) 40%,rgba(30,58,30,0.2) 100%);
  padding:48px 40px 40px;
  position:relative;
}
.scoreboard::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(to right,var(--ccvm-blue2),var(--ccvm-green2),var(--gold),var(--rshe-gold2),var(--rshe-green2));
}
.sb-corner{
  position:absolute;
  font-size:9px;letter-spacing:3px;text-transform:uppercase;
  color:var(--gold);opacity:.18;font-weight:500;
  font-family:'Cinzel',serif;
}
.sb-corner.tl{top:14px;left:18px}
.sb-corner.br{bottom:14px;right:18px}
.sb-year-lbl{
  font-family:'Cinzel',serif;
  font-size:10px;letter-spacing:5px;text-transform:uppercase;
  color:var(--gold);margin-bottom:32px;display:block;opacity:.8;
}
.sb-main{
  display:grid;grid-template-columns:1fr 90px 1fr;
  align-items:center;max-width:580px;margin:0 auto;
}
.sb-team{text-align:center}
.sb-logo-sm{
  width:56px;height:56px;
  border:none;background:transparent;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 10px;overflow:visible;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,0.6));
}
.sb-logo-sm img{width:56px;height:56px;object-fit:contain}
.sb-name{
  font-family:'Cinzel',serif;
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  font-weight:700;margin-bottom:12px;
}
.sb-name.ccvm{color:var(--ccvm-light)}.sb-name.rshe{color:var(--rshe-cream)}
.sb-pts{
  font-family:'Cinzel',serif;
  font-size:76px;font-weight:900;line-height:1;color:var(--white);
  text-shadow:0 0 40px rgba(255,255,255,0.1);
}
.sb-pts.winner-pts{text-shadow:0 0 50px rgba(201,168,76,0.4)}
.sb-vs-col{text-align:center}
.sb-vs-txt{
  font-family:'Crimson Pro',serif;font-style:italic;
  font-size:11px;letter-spacing:3px;color:var(--gold);opacity:.4;display:block;margin-bottom:8px;
}
.sb-vline{width:1px;height:60px;background:linear-gradient(to bottom,transparent,var(--gold),transparent);margin:0 auto}
.sb-badge{
  display:inline-flex;align-items:center;gap:8px;margin-top:28px;
  padding:9px 28px;font-family:'Cinzel',serif;
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  font-weight:600;border-radius:2px;
}
.sb-badge.win-c{background:rgba(26,92,42,0.25);border:1px solid rgba(42,128,64,0.5);color:var(--ccvm-light)}
.sb-badge.win-r{background:rgba(184,146,42,0.15);border:1px solid rgba(184,146,42,0.45);color:var(--rshe-cream)}
.sb-badge.win-t{background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.25);color:var(--gold);opacity:.8}
.sb-badge.win-rr{background:rgba(30,58,30,0.3);border:1px dashed rgba(184,146,42,0.4);color:var(--rshe-gold2)}
.sb-sub{
  display:block;font-family:'Crimson Pro',serif;font-style:italic;
  font-size:12px;color:var(--text2);margin-top:8px;
}

/* ── SESSION PILLS ── */
.sess-pills{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.sp{
  background:var(--surface);border:1px solid var(--border);
  border-radius:4px;padding:14px 14px;text-align:center;
}
.sp-name{
  font-size:8px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--gold);font-weight:700;opacity:.6;display:block;margin-bottom:7px;
  font-family:'Cinzel',serif;
}
.sp-score{
  font-family:'Cinzel',serif;font-size:18px;font-weight:700;
  color:var(--white);letter-spacing:1px;display:block;margin-bottom:7px;
}
.sp-bar{height:4px;border-radius:2px;overflow:hidden;background:rgba(255,255,255,0.05);display:flex}
.sp-c{background:linear-gradient(to right,var(--ccvm-blue),var(--ccvm-green2))}
.sp-r{background:linear-gradient(to right,var(--rshe-green2),var(--rshe-gold))}

/* ── SECTION LABEL ── */
.sec-lbl{
  font-family:'Cinzel',serif;
  font-size:9px;letter-spacing:4px;text-transform:uppercase;
  color:var(--gold);font-weight:600;
  margin:28px 0 12px;
  display:flex;align-items:center;gap:12px;
  opacity:.8;
}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── MATCHES ── */
.session-block{
  background:var(--surface);border:1px solid var(--border);
  border-radius:6px;overflow:hidden;margin-bottom:12px;
}
.s-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;
  background:rgba(201,168,76,0.06);
  border-bottom:1px solid var(--border);
}
.s-head-name{
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:2.5px;
  text-transform:uppercase;font-weight:600;color:var(--gold);opacity:.8;
}
.s-head-pts{
  font-family:'Cinzel',serif;font-size:13px;font-weight:700;
  color:var(--white);letter-spacing:1px;
}
.m-hdr{
  display:grid;grid-template-columns:1fr 52px 1fr;
  padding:6px 14px;gap:8px;
  background:rgba(201,168,76,0.03);
  border-bottom:1px solid var(--border2);
}
.mh{font-size:8px;letter-spacing:2px;text-transform:uppercase;font-weight:700;opacity:.3;font-family:'Cinzel',serif;}
.mh.cl{text-align:right;color:var(--ccvm-light)}
.mh.cr{text-align:left;color:var(--rshe-cream)}
.mh.cc{text-align:center;color:var(--gold)}
.match{
  display:grid;grid-template-columns:1fr 52px 1fr;
  align-items:center;padding:9px 14px;
  border-bottom:1px solid var(--border2);gap:8px;
}
.match:last-child{border-bottom:none}
.match.mc{background:rgba(26,61,110,0.1)}
.match.mr{background:rgba(30,58,30,0.15)}
.match.mh2{background:rgba(201,168,76,0.03)}
.m-c{text-align:right;font-size:12px;line-height:1.35;color:var(--text)}
.m-r{text-align:left;font-size:12px;line-height:1.35;color:var(--text)}

.m-res{
  font-family:'Cinzel',serif;font-size:10px;font-weight:700;
  color:var(--gold);text-align:center;white-space:nowrap;
  padding:3px 6px;border:1px solid rgba(201,168,76,0.2);
  border-radius:2px;width:100%;text-align:center;
}
.win-flag{width:22px;height:22px;object-fit:contain;vertical-align:middle;margin:0 5px;flex-shrink:0;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.4))}
.m-c{display:flex;align-items:center;justify-content:flex-end;gap:0}
.m-r{display:flex;align-items:center;justify-content:flex-start;gap:0}

/* ── HISTORY TABLE ── */
.hist-table{width:100%;border-collapse:collapse;font-size:13px}
.hist-table th{
  font-family:'Cinzel',serif;font-size:8px;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--gold);font-weight:600;
  padding:10px 14px;border-bottom:1px solid var(--border);
  text-align:left;background:rgba(201,168,76,0.05);opacity:.8;white-space:nowrap;
}
.hist-table td{padding:13px 14px;border-bottom:1px solid var(--border2);vertical-align:middle}
.hist-table tr:last-child td{border-bottom:none}
.hist-table tr:hover td{background:rgba(201,168,76,0.025)}
.ht-yr{font-family:'Cinzel',serif;font-size:19px;font-weight:700;color:var(--gold)}
.ht-c{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:var(--ccvm-light)}
.ht-r{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:var(--rshe-cream)}
.ht-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;background:rgba(255,255,255,0.04);width:150px}
.badge{
  font-family:'Cinzel',serif;font-size:8px;letter-spacing:1.5px;
  text-transform:uppercase;font-weight:700;padding:4px 10px;border-radius:2px;white-space:nowrap;
}
.b-c{background:rgba(26,92,42,0.3);color:var(--ccvm-light);border:1px solid rgba(42,128,64,0.4)}
.b-r{background:rgba(184,146,42,0.15);color:var(--rshe-cream);border:1px solid rgba(184,146,42,0.4)}
.b-t{background:rgba(201,168,76,0.08);color:var(--gold);border:1px solid rgba(201,168,76,0.2)}
.b-rr{background:rgba(30,58,30,0.35);color:var(--rshe-gold2);border:1px dashed rgba(184,146,42,0.4)}
.stags{display:flex;gap:5px;flex-wrap:wrap}
.stag{
  font-size:9px;padding:3px 8px;
  background:rgba(201,168,76,0.04);border:1px solid var(--border);
  color:var(--text2);border-radius:2px;
}

/* ── TOP PLAYERS ── */
.top-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px}
.top-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:6px;padding:20px;position:relative;overflow:hidden;
  transition:border-color .2s, box-shadow .2s;
}
.top-card:hover{border-color:rgba(201,168,76,0.35);box-shadow:0 0 30px rgba(201,168,76,0.06)}
.top-card::before{
  content:attr(data-n);position:absolute;top:-10px;right:8px;
  font-family:'Cinzel',serif;font-size:90px;font-weight:900;
  color:rgba(201,168,76,0.035);line-height:1;pointer-events:none;
}
.top-card-accent{
  position:absolute;top:0;left:0;width:3px;height:100%;border-radius:6px 0 0 6px;
}
.acc-c{background:linear-gradient(to bottom,var(--ccvm-blue2),var(--ccvm-green2))}
.acc-r{background:linear-gradient(to bottom,var(--rshe-gold),var(--rshe-green2))}
.top-rank{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:600;opacity:.55;margin-bottom:6px;display:block;font-family:'Cinzel',serif}
.top-name{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--white);margin-bottom:4px;line-height:1.2}
.top-team{font-size:8px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:10px;display:block}
.top-team.c{color:var(--ccvm-light)}.top-team.r{color:var(--rshe-cream)}
.top-pts{font-size:12px;color:var(--gold2);font-weight:600;margin-bottom:2px}
.top-pct{font-size:10px;color:var(--text2)}
.top-bar{height:2px;background:rgba(255,255,255,0.05);border-radius:2px;margin-top:10px;overflow:hidden}
.top-bar-fill{height:100%;border-radius:2px}
.tbf-c{background:linear-gradient(to right,var(--ccvm-blue2),var(--ccvm-green2))}
.tbf-r{background:linear-gradient(to right,var(--rshe-gold),var(--rshe-gold2))}

/* ── RANKING ── */
.rank-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.rank-team{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.rk-head{padding:12px 16px;border-bottom:1px solid var(--border);font-family:'Cinzel',serif;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;font-weight:700;display:flex;align-items:center;gap:10px}
.rk-head.c{background:rgba(26,92,42,0.2);color:var(--ccvm-light);border-bottom-color:rgba(26,92,42,0.4)}
.rk-head.r{background:rgba(184,146,42,0.12);color:var(--rshe-cream);border-bottom-color:rgba(184,146,42,0.3)}
.rk-head img{width:26px;height:26px;object-fit:contain;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.4))}
.rk-hdr-row{display:grid;grid-template-columns:24px 1fr repeat(6,27px) 44px 38px;padding:6px 14px;gap:3px;background:rgba(201,168,76,0.04);border-bottom:1px solid var(--border)}
.rh{font-family:'Cinzel',serif;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);opacity:.4;text-align:center;font-weight:600}
.rh.l{text-align:left}
.rk-row{display:grid;grid-template-columns:24px 1fr repeat(6,27px) 44px 38px;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border2);gap:3px}
.rk-row:last-child{border-bottom:none}
.rk-row:nth-child(even){background:rgba(201,168,76,0.015)}
.rk-pos{font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:var(--gold);opacity:.35;text-align:center}
.rk-name{font-weight:600;color:var(--text);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rk-yr{text-align:center;font-size:10px;color:rgba(245,240,230,0.25)}
.rk-yr.ok{color:var(--gold2);font-weight:600}.rk-yr.na{color:rgba(245,240,230,0.12)}
.rk-total{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--gold);text-align:right}
.rk-pct{font-size:10px;color:var(--text2);text-align:right}

/* ── TOTALS ── */
.totals-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:680px;margin-bottom:32px}
.tot{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:18px;text-align:center;position:relative;overflow:hidden}
.tot::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.tot.tc::before{background:linear-gradient(to right,var(--ccvm-blue),var(--ccvm-green2))}
.tot.tr::before{background:linear-gradient(to right,var(--rshe-green2),var(--rshe-gold))}
.tot.tg::before{background:var(--gold)}
.tot.tw::before{background:var(--rshe-gold2)}
.tot-val{font-family:'Cinzel',serif;font-size:32px;font-weight:700;display:block;margin-bottom:5px}
.tot-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);line-height:1.5}

/* ── RESPONSIVE ── */
@media(max-width:800px){
  .hero-battle{grid-template-columns:1fr auto 1fr}.hero-center{padding:16px 12px}
  .overview{grid-template-columns:repeat(3,1fr) !important}
  .ov-item:nth-child(n+4){display:block !important}
  .rank-grid{grid-template-columns:1fr}.top-grid{grid-template-columns:1fr 1fr}
  .sess-pills{grid-template-columns:1fr}
  .sb-pts{font-size:56px}.sb-main{max-width:100%}
  .totals-strip{grid-template-columns:1fr 1fr}
  .club-logo-wrap{width:72px;height:72px}.club-logo-wrap img{width:62px;height:62px}
  .club-abbr{font-size:20px}
  .jugadores-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:540px){
  /* Hero compacto */
  .hero-battle{grid-template-columns:1fr auto 1fr;min-height:200px}
  .club-side{padding:20px 8px 28px}
  .club-logo-wrap{width:52px;height:52px}.club-logo-wrap img{width:44px;height:44px}
  .club-abbr{font-size:15px;letter-spacing:1px}
  .club-fullname{font-size:8px;letter-spacing:1px}
  .club-founded{font-size:9px;letter-spacing:1.5px;padding:3px 8px}
  .hero-center{padding:10px 6px;gap:6px}
  .hero-title{font-size:18px;letter-spacing:2px}
  .hero-title span{font-size:52px;letter-spacing:4px}
  .hero-years{font-size:9px}
  .hero-venue{font-size:17px}
  /* Overview */
  .overview{grid-template-columns:1fr 1fr 1fr !important}
  .ov-item:nth-child(n+4){display:block !important}
  .overview-wrap{padding:0 8px}
  .ov-item{padding:14px 6px;border-bottom:1px solid var(--border)}
  .ov-year{font-size:15px}.ov-score{font-size:12px}.ov-badge{font-size:8px;padding:3px 6px}
  /* Tabs */
  .tab-nav{gap:2px;padding:0 8px}
  .tab-btn{font-size:10px;padding:8px 10px;letter-spacing:1px}
  /* Content */
  #content{padding:0 10px 60px}
  /* Scoreboard */
  .scoreboard-inner{padding:28px 16px 28px}
  .sb-pts{font-size:48px}
  .sb-main{grid-template-columns:1fr 60px 1fr}
  .sb-name{font-size:9px;letter-spacing:1.5px}
  .sb-logo-sm{width:36px;height:36px}.sb-logo-sm img{width:30px;height:30px}
  .sb-badge{padding:7px 14px;font-size:9px;letter-spacing:1.5px}
  .sb-year-lbl{margin-bottom:18px}
  /* Sessions */
  .sess-pills{grid-template-columns:1fr}
  .sp-score{font-size:15px}
  /* Matches */
  .match{padding:7px 10px;gap:4px}
  .m-c,.m-r{font-size:11px}
  .m-res{font-size:10px;padding:2px 4px}
  .win-flag{width:16px;height:16px;margin:0 3px}
  .s-head{padding:8px 12px}
  .s-head-pts{font-size:11px}
  /* Tables */
  .hist-table{font-size:11px}
  .hist-table th{padding:8px 8px;font-size:8px}
  .hist-table td{padding:9px 8px}
  .ht-bar-wrap{display:none}
  .ht-yr{font-size:15px}
  .ht-c,.ht-r{font-size:16px}
  /* Top cards */
  .top-grid{grid-template-columns:1fr}
  .top-card{padding:14px}
  /* Totals */
  .totals-strip{grid-template-columns:1fr 1fr;gap:8px}
  .tot-val{font-size:24px}
  /* Ranking */
  .rk-hdr-row,.rk-row{grid-template-columns:20px 1fr repeat(6,18px) 38px 32px;padding:6px 6px;gap:2px}
  .rk-name{font-size:11px}
  .rk-yr{font-size:9px}
  .rk-total{font-size:12px}
  .rk-pct{font-size:9px}
  /* Jugadores */
  .palmares-list{grid-template-columns:1fr}
  .jugadores-grid{grid-template-columns:repeat(2,1fr)}
  .player-avatar{width:52px;height:52px;font-size:15px}
  .player-name{font-size:9px}
  .player-pts-val{font-size:14px}
  /* Sec labels */
  .sec-lbl{font-size:8px;letter-spacing:2px}
}

/* ── PALMARES CARDS ── */
.palmares-list{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.palmares-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:6px;padding:16px 18px;cursor:pointer;
  transition:background .2s;
}
.palmares-card:hover{background:rgba(201,168,76,0.06)}
.palmares-top{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:4px}
.palmares-score{display:flex;align-items:center}

/* ── JUGADORES ── */
.jugadores-section{margin-bottom:40px}
.jugadores-team-header{
  display:flex;align-items:center;gap:14px;
  padding:14px 20px;border-radius:6px 6px 0 0;
  border:1px solid var(--border);border-bottom:none;
  margin-top:32px;
}
.jugadores-team-header.c{background:linear-gradient(135deg,rgba(26,92,42,0.3),rgba(26,61,110,0.2));border-color:rgba(26,92,42,0.4)}
.jugadores-team-header.r{background:linear-gradient(135deg,rgba(30,58,30,0.35),rgba(184,146,42,0.12));border-color:rgba(184,146,42,0.3)}
.jugadores-team-header img{width:36px;height:36px;object-fit:contain;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4))}
.jugadores-team-name{font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase}
.jugadores-team-name.c{color:var(--ccvm-light)}.jugadores-team-name.r{color:var(--rshe-cream)}
.jugadores-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  border:1px solid var(--border);border-radius:0 0 6px 6px;overflow:hidden;
}
.jugadores-grid.c{border-color:rgba(26,92,42,0.4)}.jugadores-grid.r{border-color:rgba(184,146,42,0.3)}
.player-card{
  display:flex;flex-direction:column;align-items:center;
  padding:20px 12px 16px;
  border-right:1px solid var(--border2);
  border-bottom:1px solid var(--border2);
  background:var(--surface);
  transition:background .2s;
  position:relative;
}
.player-card:hover{background:rgba(201,168,76,0.06)}
.player-card:nth-child(4n){border-right:none}
.player-photo{
  width:64px;height:64px;border-radius:50%;
  overflow:hidden;margin-bottom:10px;flex-shrink:0;
  position:relative;
}
.player-photo img{width:100%;height:100%;object-fit:cover}
.player-avatar{
  width:64px;height:64px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:10px;flex-shrink:0;
  font-family:'Cinzel',serif;font-size:18px;font-weight:700;
}
.player-avatar.c{
  background:linear-gradient(135deg,rgba(26,61,110,0.6),rgba(26,92,42,0.4));
  border:1.5px solid rgba(42,128,64,0.5);color:var(--ccvm-light);
}
.player-avatar.r{
  background:linear-gradient(135deg,rgba(30,58,30,0.6),rgba(184,146,42,0.2));
  border:1.5px solid rgba(184,146,42,0.4);color:var(--rshe-cream);
}
.player-name{
  font-family:'Cinzel',serif;font-size:10px;font-weight:700;
  letter-spacing:0.5px;text-align:center;color:var(--white);
  line-height:1.3;margin-bottom:6px;
}
.player-stats{display:flex;gap:10px;align-items:center;margin-top:4px}
.player-pts-val{
  font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--gold);
}
.player-pts-lbl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2)}
.player-pct-bar{
  width:100%;height:3px;background:rgba(255,255,255,0.06);
  border-radius:2px;overflow:hidden;margin-top:6px;
}
.player-pct-fill{height:100%;border-radius:2px}
.ppf-c{background:linear-gradient(to right,var(--ccvm-blue2),var(--ccvm-green2))}
.ppf-r{background:linear-gradient(to right,var(--rshe-gold),var(--rshe-gold2))}
.player-years{
  display:flex;gap:3px;margin-top:6px;flex-wrap:wrap;justify-content:center;
}
.py-dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(201,168,76,0.25);
  title:'año';
}
.py-dot.played{background:var(--gold);opacity:0.7}
@media(max-width:800px){.jugadores-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:540px){.jugadores-grid{grid-template-columns:repeat(2,1fr)}}

.sb-captain{
  font-family:'Crimson Pro',serif;font-style:italic;
  font-size:13px;color:var(--gold);opacity:.6;
  margin-top:6px;letter-spacing:0.5px;
}

.palmares-caps{display:flex;gap:16px;margin:6px 0 2px;flex-wrap:wrap}
.pcap{font-family:'Crimson Pro',serif;font-style:italic;font-size:12px;opacity:.7}
.ccvm-cap{color:var(--ccvm-light)}.rshe-cap{color:var(--rshe-cream)}

/* ── OVERVIEW TOTALS ── */
.overview-totals{
  display:flex;align-items:center;justify-content:center;
  gap:40px;margin-bottom:14px;
}
.ov-total{display:flex;flex-direction:column;align-items:center;gap:2px}
.ov-tot-name{
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;
  text-transform:uppercase;font-weight:700;
}
.ccvm-tot .ov-tot-name{color:var(--ccvm-light)}
.rshe-tot .ov-tot-name{color:var(--rshe-cream)}
.ov-tot-val{

function calc(p){let t=0;p.pts.forEach(v=>{if(v!==null)t+=v;});const po=p.pos;return{total:t,posible:po,pct:po>0?t/po:0};}

function logoImg(team,size=18,cls=''){
  const src = team==='c'?LOGO_CCVM:LOGO_RSHE;
  return `<img src="${src}" style="width:${size}px;height:${size}px;object-fit:contain;border-radius:50%;background:rgba(0,0,0,0.3);padding:1px" class="${cls}" >`;
}

function badgeForResult(result,retains){
  if(result==='ccvm'||result==='c') return`<span class="badge b-c">🏆 Victoria CCVM</span>`;
  if(result==='rshe'||result==='r') return`<span class="badge b-r">🏆 Victoria RSHECC</span>`;
  if(retains==='rshe') return`<span class="badge b-rr">RSHECC retiene</span>`;
  return`<span class="badge b-t">🤝 Empate · 1ª Edición</span>`;
}

// OVERVIEW
function buildOverview(){
  document.getElementById('overview-strip').innerHTML = Object.entries(DATA).map(([y,d])=>{
    const isTieRshe = d.result==='tie'&&d.retains==='rshe';
    const isRshe = d.result==='rshe';
    const isCcvm = d.result==='ccvm';
    const itmCls = isTieRshe?'tie-rshe':isRshe?'win-rshe-item':isCcvm?'win-ccvm-item':'';
    const badgeCls = isTieRshe?'ob-rshe-ret':isRshe?'ob-rshe':isCcvm?'ob-ccvm':'ob-tie';
    const badgeLabel = isTieRshe?'RSHECC ↩':isRshe?'RSHECC':isCcvm?'CCVM':'Empate';
    const cc = (isCcvm)?'#d4ebd8':'rgba(245,240,230,0.45)';
    const rc = (isRshe||isTieRshe)?'#f5ead0':'rgba(245,240,230,0.45)';
    return`<div class="ov-item ${itmCls}" onclick="goYear(${y})">
      <span class="ov-year">${y}</span>
      <span class="ov-score"><span style="color:${cc}">${d.ccvm}</span> – <span style="color:${rc}">${d.rshe}</span></span>
      <span class="ov-badge ${badgeCls}">${badgeLabel}</span>
    </div>`;
  }).join('');
}

// EDITION TAB
function buildEdition(year){
  const d = DATA[year];
  const el = document.getElementById('tab-y'+year);

  let badgeCls = d.result==='ccvm'?'win-c':d.result==='rshe'?'win-r':d.retains==='rshe'?'win-rr':'win-t';
  let badgeLabel = d.result==='ccvm'?'🏆 Victoria CCVM':d.result==='rshe'?'🏆 Victoria RSHECC':d.retains==='rshe'?'RSHECC retiene la copa':'🤝 Empate · Primera edición';
  let subLine = d.retains==='rshe'?`<span class="sb-sub">El campeón defensor retiene la copa</span>`:'';

  const cW = d.result==='ccvm', rW = d.result==='rshe'||d.retains==='rshe';

  let html = `<div class="scoreboard"><div class="scoreboard-inner">
    <span class="sb-corner tl">Estela · Portugal</span>
    <span class="sb-corner br">Edición ${year}</span>
    <span class="sb-year-lbl">Edición ${year}</span>
    <div class="sb-main">
      <div class="sb-team">
        <div class="sb-logo-sm"><img src="${LOGO_CCVM}"  alt="CCVM"></div>
        <div class="sb-name ccvm">CCVM</div>
        <div class="sb-pts${cW?' winner-pts':''}" style="color:${cW?'var(--ccvm-light)':'rgba(245,240,230,0.5)'}">${d.ccvm}</div>
        <div class="sb-captain">Cap. ${d.capCCVM}</div>
      </div>
      <div class="sb-vs-col">
        <span class="sb-vs-txt">vs</span>
        <div class="sb-vline"></div>
      </div>
      <div class="sb-team">
        <div class="sb-logo-sm"><img src="${LOGO_RSHE}"  alt="RSHECC"></div>
        <div class="sb-name rshe">RSHECC</div>
        <div class="sb-pts${rW?' winner-pts':''}" style="color:${rW?'var(--rshe-cream)':'rgba(245,240,230,0.5)'}">${d.rshe}</div>
        <div class="sb-captain">Cap. ${d.capRSHE}</div>
      </div>
    </div>
    <div class="sb-badge ${badgeCls}">${badgeLabel}</div>
    ${subLine}
  </div></div>`;

  // Session pills
  html += `<div class="sess-pills">`;
  for(const s of d.sessions){
    const parts = s.score.replace(',','.').split('–').map(x=>parseFloat(x.trim()));
    const tot = parts[0]+parts[1];
    const pc = tot>0?(parts[0]/tot*100).toFixed(0):50;
    const pr = tot>0?(parts[1]/tot*100).toFixed(0):50;
    html += `<div class="sp">
      <span class="sp-name">${s.name}</span>
      <span class="sp-score">CCVM ${s.score} RSHECC</span>
      <div class="sp-bar"><div class="sp-c" style="width:${pc}%"></div><div class="sp-r" style="width:${pr}%"></div></div>
    </div>`;
  }
  html += `</div>`;

  // Matches
  html += `<div class="sec-lbl">Resultados · Partido a Partido</div>`;
  for(const s of d.sessions){
    html += `<div class="session-block">
      <div class="s-head">
        <span class="s-head-name">${s.name}</span>
        <span class="s-head-pts">CCVM ${s.score} RSHECC</span>
      </div>
      <div class="m-hdr">
        <span class="mh cl">CCVM</span><span class="mh cc">Res.</span><span class="mh cr">RSHECC</span>
      </div>`;
    for(const m of s.matches){
      const rowCls = m.w==='c'?'mc':m.w==='r'?'mr':'mh2';
      const resDisplay = m.res||'—';
      const logoC = m.w==='c' ? `<img src="${LOGO_CCVM}" class="win-flag">` : '';
      const logoR = m.w==='r' ? `<img src="${LOGO_RSHE}" class="win-flag">` : '';
      html += `<div class="match ${rowCls}">
        <span class="m-c">${logoC}${m.ccvm}</span>
        <span class="m-res">${resDisplay}</span>
        <span class="m-r">${m.rshe}${logoR}</span>
      </div>`;
    }
    html += `</div>`;
  }
  el.innerHTML = html;
}

// RANKING TAB
function buildRanking(){
  const el = document.getElementById('tab-ranking');
  function renderTeam(players,team,label){
    const sorted = players.map(p=>({...p,...calc(p)})).sort((a,b)=>b.total-a.total);
    let h=`<div class="rank-team">
      <div class="rk-head ${team}">${logoImg(team,22)} ${label}</div>
      <div class="rk-hdr-row">
        <span class="rh">#</span><span class="rh l">Jugador</span>
        <span class="rh">'21</span><span class="rh">'22</span><span class="rh">'23</span>
        <span class="rh">'24</span><span class="rh">'25</span><span class="rh">'26</span>
        <span class="rh">Tot.</span><span class="rh">%</span>
      </div>`;
    sorted.forEach((p,i)=>{
      const yrs=p.pts.map(v=>v===null?`<span class="rk-yr na">–</span>`:`<span class="rk-yr ok">${v}</span>`).join('');
      h+=`<div class="rk-row">
        <span class="rk-pos">${i+1}</span>
        <span class="rk-name">${p.name}</span>
        ${yrs}
        <span class="rk-total">${p.total}</span>
        <span class="rk-pct">${(p.pct*100).toFixed(0)}%</span>
      </div>`;
    });
    return h+'</div>';
  }
  el.innerHTML=`<div class="sec-lbl">Ranking histórico · puntos acumulados</div>
  <div class="rank-grid">
    ${renderTeam(PLAYERS_CCVM,'c','Club de Campo Villa de Madrid')}
    ${renderTeam(PLAYERS_RSHE,'r','Real Sociedad Hípica Española CC')}
  </div>`;
}


// JUGADORES TAB
function buildJugadores(){
  const el = document.getElementById('tab-jugadores');
  const years = [2021,2022,2023,2024,2025,2026];

  function renderTeam(players, team, logoSrc, teamLabel){
    const sorted = [...players].map(p=>({...p,...calc(p)})).sort((a,b)=>b.total-a.total);
    const teamClass = team==='c'?'c':'r';
    const fillClass = team==='c'?'ppf-c':'ppf-r';

    let h = `
    <div class="jugadores-section">
      <div class="jugadores-team-header ${teamClass}">
        <img src="${logoSrc}" alt="${teamLabel}">
        <span class="jugadores-team-name ${teamClass}">${teamLabel}</span>
      </div>
      <div class="jugadores-grid ${teamClass}">`;

    sorted.forEach(p=>{
      const initials = p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      const pct = (p.pct*100).toFixed(0);
      // Year dots: filled if player has pts that year
      const dots = years.map((y,i)=>{
        const played = p.pts[i] !== null;
        return `<div class="py-dot${played?' played':''}" title="${y}"></div>`;
      }).join('');

      // Photo placeholder — just initials avatar for now
      // Replace this img tag with a real photo when available:
      // <img src="photos/${p.name.replace(/ /g,'_')}.jpg" ...>
      h += `
        <div class="player-card">
          <div class="player-avatar ${teamClass}">${initials}</div>
          <div class="player-name">${p.name}</div>
          <div class="player-stats">
            <span class="player-pts-val">${p.total}</span>
            <span class="player-pts-lbl">pts / ${p.posible}</span>
          </div>
          <div class="player-pct-bar"><div class="player-pct-fill ${fillClass}" style="width:${pct}%"></div></div>
          <div class="player-years">${dots}</div>
        </div>`;
    });

    h += `</div></div>`;
    return h;
  }

  el.innerHTML =
    renderTeam(PLAYERS_CCVM, 'c', LOGO_CCVM, 'Club de Campo Villa de Madrid') +
    renderTeam(PLAYERS_RSHE, 'r', LOGO_RSHE, 'Real Sociedad Hípica Española CC');
}
// TABS
function goYear(y){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  const btn=document.querySelector(`[data-tab="y${y}"]`);
  if(btn)btn.classList.add('active');
  document.getElementById(`tab-y${y}`).classList.add('active');
  window.scrollTo({top:document.querySelector('.tab-nav').offsetTop-16,behavior:'smooth'});
}
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
  });
});
